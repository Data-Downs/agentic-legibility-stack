name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test

  deploy-studio:
    name: Deploy Legibility Studio
    needs: test
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build workspace packages (emit JS, skip type-check)
        run: npx turbo run build --filter='./packages/*' -- --noCheck
      - run: npx @opennextjs/cloudflare build && npx wrangler deploy
        working-directory: apps/legibility-studio
      - name: Seed personas into D1
        run: |
          STUDIO_URL=$(npx wrangler deployments list --name als-studio --json 2>/dev/null | node -e "
            const d = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
            // Fallback to known URL
            console.log('https://als-studio.chris-8ab.workers.dev');
          ")
          PERSONAS='{"personas":['
          FIRST=true
          for f in data/simulated/users/*.json; do
            if [ "$FIRST" = true ]; then FIRST=false; else PERSONAS="$PERSONAS,"; fi
            PERSONAS="$PERSONAS$(cat "$f")"
          done
          PERSONAS="$PERSONAS]}"
          echo "Seeding $(echo "$PERSONAS" | node -e "const d=JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')); console.log(d.personas.length)") personas..."
          curl -sf -X POST "$STUDIO_URL/api/v1/seed-personas" \
            -H "Content-Type: application/json" \
            -d "$PERSONAS"

  deploy-citizen-experience:
    name: Deploy Citizen Experience
    needs: [test, deploy-studio]
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build workspace packages (emit JS, skip type-check)
        run: npx turbo run build --filter='./packages/*' -- --noCheck
      - run: npx @opennextjs/cloudflare build && npx wrangler deploy
        working-directory: apps/citizen-experience

  deploy-citizen-02:
    name: Deploy Citizen App
    needs: [test, deploy-studio]
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build workspace packages (emit JS, skip type-check)
        run: npx turbo run build --filter='./packages/*' -- --noCheck
      - run: npx @opennextjs/cloudflare build && npx wrangler deploy
        working-directory: apps/citizen-02
